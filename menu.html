<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Menu</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<style>
body{
    margin:0;
    padding:20px;
    background:#f4f4f4;
    font-family:Georgia, serif;
}

#menu{
    width:240px;
    background:white;
    border-radius:15px;
    box-shadow:0 3px 8px rgba(0,0,0,.15);
    overflow:hidden;
}

#menu ul{
    margin:0;
    padding:0;
}

#menu li{
    list-style:none;
}

#menu li a{
    display:block;
    text-decoration:none;
    color:#222;
    padding:15px 20px;
    font-size:22px;
    transition:.3s;
}

.titre{
    background:#e5dcc5;
    color:#80611d;
    font-weight:bold;
    text-align:center;
    border-radius:15px 15px 0 0;
}

.titre:hover{
    background:#d8ccb0;
}

.normal:hover{
    background:#f3f3f3;
    padding-left:28px;
}

.cv{
    background:#2b6f72;
    color:white!important;
    border-radius:0 0 15px 15px;
}

.cv:hover{
    background:#1d5b5d;
}

.fa-folder{
    color:#b79b49;
    margin-right:10px;
}

.fa-user{
    margin-right:10px;
}
</style>

</head>
<body>
