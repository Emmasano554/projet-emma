<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <title>Menu</title>
    <style>
        /* --- Styles Généraux --- */
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: #f7f5f0; /* Fond crème doux assorti au thème */
            margin: 0;
            padding: 15px 10px;
        }

        /* Conteneur de la liste */
        #menu {
            list-style-type: none;
            padding: 0;
            margin: 0;
            display: flex;
            flex-direction: column;
            gap: 8px; /* Espace régulier entre les boutons */
        }

        /* --- Le Style des Liens (Boutons) --- */
        #menu a {
            display: block;
            text-decoration: none;
            color: #5c4a3c; /* Texte marron foncé doux */
            font-weight: 600;
            font-size: 15px;
            padding: 12px 20px;
            border-radius: 6px; /* Angles légèrement arrondis comme la maquette */
            transition: all 0.25s ease;
            text-align: left; /* Aligné à gauche avec une marge */
        }

        /* --- Effet au Survol de la souris --- */
        #menu a:hover {
            background-color: #eaddca; /* Fond crème plus foncé au survol */
            color: #2c1d11; /* Texte encore plus sombre */
            padding-left: 25px; /* Petit effet de décalage fluide vers la droite */
        }

        /* --- Style spécial pour l'élément actif / sélectionné --- */
        /* Par exemple, si vous voulez mettre en valeur la "Page 1" ou le CV */
        #menu a.active {
            background-color: #4a6b5d; /* Vert canard/forêt très élégant */
            color: #ffffff; /* Texte blanc pour le contraste */
        }
    </style>
</head>

<body>

        <li><a href="tpformulaire.html" TARGET="affichage">TP Formulaire</a></li>
        <li><a href="tableau.html" TARGET="affichage">TABLEAU</a></li>
        <li><a href="cv.html" TARGET="affichage">CV</a></li>
    </ul>

</body>
</html>
