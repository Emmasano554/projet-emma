<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulaires</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light py-5">

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-8 col-lg-6">
                
                <div class="card shadow">
                    <div class="card-header bg-primary text-white text-center py-3">
                        <h2 class="h4 mb-0">Formulaire d'Inscription & Souhaits</h2>
                    </div>
                    <div class="card-body p-4">

                        <p class="text-muted mb-4 small">Veuillez remplir les informations ci-dessous avec soin.</p>

                        <form method="post" action="cible_formulaire.php"> 
                            
                            <fieldset class="border rounded p-3 mb-4"> 
                                <legend class="w-auto px-2 fs-5 text-primary fw-bold">Vos coordonnées</legend> 
                                
                                <div class="mb-3">
                                    <label for="nom" class="form-label">Quel est votre nom ?</label>
                                    <input type="text" class="form-control" name="nom" id="nom" tabindex="10" placeholder="Ex: Dupont" required />
                                </div>
                                
                                <div class="mb-3">
                                    <label for="prenom" class="form-label">Quel est votre prénom ?</label>
                                    <input type="text" class="form-control" name="prenom" id="prenom" tabindex="20" placeholder="Ex: Jean" required />
                                </div>
                                
                                <div class="mb-3">
                                    <label for="email" class="form-label">Quel est votre e-mail ?</label>
                                    <input type="email" class="form-control" name="email" id="email" tabindex="30" placeholder="nom@exemple.com" required />
                                </div>

                                <div class="mb-3">
                                    <label for="pass" class="form-label">Votre mot de passe :</label> 
                                    <input type="password" class="form-control" name="pass" id="pass" placeholder="••••••••" required /> 
                                </div>
                            </fieldset> 
                            
                            <fieldset class="border rounded p-3 mb-4">
                                <legend class="w-auto px-2 fs-5 text-primary fw-bold">Profil & Préférences</legend>

                                <div class="mb-4">
                                    <label class="form-label d-block">Veuillez indiquer votre tranche d'âge :</label> 
                                    <div class="form-check">
                                        <input class="form-check-input" type="radio" name="age" value="moins15" id="moins15" /> 
                                        <label class="form-check-label" for="moins15">Moins de 15 ans</label>
                                    </div>
                                    <div class="form-check">
                                        <input class="form-check-input" type="radio" name="age" value="medium15-25" id="medium15-25" /> 
                                        <label class="form-check-label" for="medium15-25">15-25 ans</label>
                                    </div>
                                    <div class="form-check">
                                        <input class="form-check-input" type="radio" name="age" value="medium25-40" id="medium25-40" /> 
                                        <label class="form-check-label" for="medium25-40">25-40 ans</label>
                                    </div>
                                    <div class="form-check">
                                        <input class="form-check-input" type="radio" name="age" value="plus40" id="plus40" /> 
                                        <label class="form-check-label" for="plus40">Encore plus vieux que ça ?!</label> 
                                    </div>
                                </div>

                                <div class="mb-4">
                                    <label for="pays" class="form-label">Dans quel pays habitez-vous ?</label>
                                    <select class="form-select" name="pays" id="pays"> 
                                        <option value="" selected disabled>Choisissez un pays...</option>
                                        <optgroup label="Europe"> 
                                            <option value="france">France</option> 
                                            <option value="espagne">Espagne</option> 
                                            <option value="italie">Italie</option> 
                                            <option value="royaume-uni">Royaume-Uni</option> 
                                        </optgroup> 
                                        <optgroup label="Amérique"> 
                                            <option value="canada">Canada</option> 
                                            <option value="etats-unis">Etats-Unis</option> 
                                        </optgroup> 
                                        <optgroup label="Asie"> 
                                            <option value="chine">Chine</option> 
                                            <option value="japon">Japon</option> 
                                        </optgroup> 
                                    </select> 
                                </div>

                                <div class="mb-2">
                                    <label class="form-label d-block">Cochez les aliments que vous aimez manger :</label> 
                                    <div class="form-check form-check-inline">
                                        <input class="form-check-input" type="checkbox" name="frites" id="frites" /> 
                                        <label class="form-check-label" for="frites">Frites</label>
                                    </div>
                                    <div class="form-check form-check-inline">
                                        <input class="form-check-input" type="checkbox" name="steak" id="steak" /> 
                                        <label class="form-check-label" for="steak">Steak haché</label>
                                    </div>
                                    <div class="form-check form-check-inline">
                                        <input class="form-check-input" type="checkbox" name="epinards" id="epinards" checked /> 
                                        <label class="form-check-label" for="epinards">Epinards</label>
                                    </div>
                                    <div class="form-check form-check-inline">
                                        <input class="form-check-input" type="checkbox" name="huitres" id="huitres" /> 
                                        <label class="form-check-label" for="huitres">Huîtres</label> 
                                    </div>
                                </div>
                            </fieldset> 
                            
                            <fieldset class="border rounded p-3 mb-4"> 
                                <legend class="w-auto px-2 fs-5 text-primary fw-bold">Votre souhait</legend> 
                                
                                <div class="mb-3"> 
                                    <label class="form-label d-block">Faites un souhait que vous voudriez voir exaucé :</label> 
                                    <div class="form-check">
                                        <input class="form-check-input" type="radio" name="souhait" value="riche" id="riche" tabindex="40" /> 
                                        <label class="form-check-label" for="riche">Être riche</label>
                                    </div>
                                    <div class="form-check">
                                        <input class="form-check-input" type="radio" name="souhait" value="celebre" id="celebre" tabindex="50" /> 
                                        <label class="form-check-label" for="celebre">Être célèbre</label>
                                    </div>
                                    <div class="form-check">
                                        <input class="form-check-input" type="radio" name="souhait" value="intelligent" id="intelligent" tabindex="60" /> 
                                        <label class="form-check-label" for="intelligent">Être <strong class="text-danger">encore</strong> plus intelligent</label>
                                    </div>
                                    <div class="form-check">
                                        <input class="form-check-input" type="radio" name="souhait" value="autre" id="autre" tabindex="70" /> 
                                        <label class="form-check-label" for="autre">Autre...</label>
                                    </div>
                                </div> 
                                
                                <div class="mb-2"> 
                                    <label for="precisions" class="form-label">Si "Autre", veuillez préciser :</label>
                                    <textarea class="form-control" name="precisions" id="precisions" rows="3" tabindex="80" placeholder="Dites-nous en plus..."></textarea> 
                                </div> 
                            </fieldset> 

                            <div class="d-flex gap-2 justify-content-end"> 
                                <button type="reset" class="btn btn-secondary">Réinitialiser</button> 
                                <button type="submit" class="btn btn-primary">Envoyer le formulaire</button> 
                            </div> 
                        </form> 

                    </div>
                </div>

            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
