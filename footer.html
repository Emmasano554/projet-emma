<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Footer</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <style>
        /* S'assure que le footer fait au maximum 20% de la hauteur de la fenêtre */
        .max-h-20 {
            height: 20vh;
            max-height: 20vh;
        }
        /* Style discret pour les liens */
        .footer-link {
            color: #94a3b8;
            text-decoration: none;
            transition: color 0.2s ease-in-out;
        }
        .footer-link:hover {
            color: #38bdf8;
        }
    </style>
</head>
<body class="bg-light">

    <!-- Conteneur principal (simulé pour le placement du footer en bas) -->
    <div style="height: 80vh;"></div>

    <!-- ================= FOOTER ================= -->
    <footer class="bg-dark text-white max-h-20 border-top border-secondary d-flex align-items-center py-2">
        <div class="container-fluid px-4">
            <div class="row align-items-center justify-content-between g-1">
                
                <!-- Section Gauche : Copyright / Nom -->
                <div class="col-12 col-md-4 text-center text-md-start">
                    <p class="mb-0 small text-muted">
                        &copy; 2026 <span class="text-white fw-semibold">Emmanuella TOGNI</span>
                    </p>
                    <span class="text-muted d-none d-md-inline" style="font-size: 0.75rem;">Licence Informatique de Gestion & Droit</span>
                </div>

                <!-- Section Centre : Navigation Rapide (Compacte) -->
                <div class="col-12 col-md-4 text-center my-1 my-md-0">
                    <div class="d-flex justify-content-center gap-3 small">
                        <a href="page0.html" target="affichage" class="footer-link">Accueil</a>
                        <span class="text-secondary">|</span>
                        <a href="tpformulaire.html" target="affichage" class="footer-link">Projets</a>
                        <span class="text-secondary">|</span>
                        <a href="CV.html" target="affichage" class="footer-link">Mon CV</a>
                    </div>
                </div>

                <!-- Section Droite : Réseaux & Liens GitHub -->
                <div class="col-12 col-md-4 text-center text-md-end">
                    <div class="d-flex justify-content-center justify-content-md-end gap-3">
                        <a href="https://github.com/Emmasano554" target="_blank" class="footer-link fs-5" title="GitHub">
                            <i class="bi bi-github"></i>
                        </a>
                        <a href="#" class="footer-link fs-5" title="LinkedIn">
                            <i class="bi bi-linkedin"></i>
                        </a>
                        <a href="mailto:emmanuella.togni@exemple.com" class="footer-link fs-5" title="Contact">
                            <i class="bi bi-envelope-fill"></i>
                        </a>
                    </div>
                </div>

            </div>
        </div>
    </footer>

    <!-- Bootstrap 5 JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
